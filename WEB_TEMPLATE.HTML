<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEMPLATES</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        .mainContainer {
            width: 100vw;
            height: 100vh;


        }

        header {
            width: 100vw;
            height: 10vh;
            background: #EEEBEC;
            display: flex;
            justify-content: space-evenly;
            align-items: center;

        }

        header>.btns>a {
            margin-right: 70px;
            text-decoration: none;
            color: #7A6666;

        }

        header>.btns>a:hover {
            color: rgb(201, 193, 14);

        }

        header>.btns>a:nth-child(1) {
            color: #ca305cf5;
        }

        header>.btns>a:nth-child(2) {
            position: relative;
        }

        header>.btns>a:nth-child(2)::after {
            content: 'PRODUCT';
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0;
            color: rgb(201, 193, 14);
            font-size: 16px;
            transform: translateY(0);
            transition: opacity 0.3s, transform 0.3s;
        }

        header>.btns>a:nth-child(2):hover::after {
            opacity: 1;
            transform: translateY(30px);
        }


        header>.btns>a:nth-child(3) {
            position: relative;
        }

        header>.btns>a:nth-child(3)::after {
            content: 'SINGLE POST';
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0;
            color: rgb(201, 193, 14);
            font-size: 16px;
            transform: translateY(0);
            transition: opacity 0.3s, transform 0.3s;
        }

        header>.btns>a:nth-child(3):hover::after {
            opacity: 1;
            transform: translateY(30px);
        }


        .image-1 {
            position: relative;
            margin: auto;
            background: #ffffff;
        }

        .image-1 img {
            min-width: none;
            display: block;
            margin: auto;

        }

        .image-1>.circles {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            color: white;
            font-size: 24px;
            position: absolute;
            bottom: 70px;
            right: 540px;
            background: #ca305cf5;
            cursor: pointer;
            box-shadow: -12px 8px #C9C10E;

        }

        .image-1>.circles>p {
            position: absolute;
            top: 50px;
            left: 20px;
            cursor: pointer;
            font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }



        .second-box {
            width: 100vw;
            height: 260px;
            background: #EAE7E8;
            display: flex;
            justify-content: space-evenly;
            position: relative;
        }

        .second-box>.text-sec {
            padding: 20px;
            margin: 20px;
            line-height: 30px;
        }

        .second-box>.img {
            height: 30%;
            padding: 0px 0 50px 0px;
        }


        .third-box {
            height: 150px;
            background: #d2c343;
            color: #fff;
            display: flex;
            gap: 100px;
            justify-content: center;
            padding: 40px 0 30px 0;
        }

        .third-section {
            text-align: center;

        }

        .third-section i {
            font-size: 46px;
            font-weight: 400px;
            display: block;
            margin-bottom: 12px;
            cursor: pointer;
        }

        .third-section a {

            margin-top: 10px;
        }





        .fourth-bottom {
            height: 300px;
            background: #c84a67;
            text-align: center;
            padding: 50px 0 50px 0;
        }

        .link {
            color: #fff;
            text-decoration: none;
            font-weight: 500;
            font-size: 18px;
        }

        .social-icons {
            margin-bottom: 15px;
        }

        .social-icons a {
            display: inline-block;
            width: 40px;
            height: 40px;
            line-height: 40px;
            margin: 0 7px;
            background: #fff;
            color: #c84a67;
            border-radius: 5px;
            font-size: 20px;
            text-align: center;
        }

        .copyright {
            color: #fff;
            font-size: 14px;
            margin-top: 10px;
        }
    </style>
</head>

<body>
    <div class="mainContainer">
        <div class="first-box">
            <header>
                <div class="logo">
                    <img src="https://freewebsitetemplates.com/preview/frozenyogurtshop/images/logo.png" alt="">

                </div>
                <div class="btns">
                    <a href="">HOME</a>
                    <a href="">ABOUT</a>
                    <a href="">BLOG</a>
                    <a href="">CONTACT</a>
                </div>
            </header>
            <section class="image-1">
                <img src="https://freewebsitetemplates.com/preview/frozenyogurtshop/images/bg-home.jpg" alt="">
                <div class="circles">
                    <p> FREEZE<br>DELIGHT</p>
                </div>
            </section>



            <section class="second-box">
                <div class="text-sec">
                    <h3 style="color: #7A6666;">NEW PRODUCT</h3>
                    <h1 style="margin-top: 10px; color:#ca305cf5 ;">The Twist of Healthy Yogurt</h1>
                    <p style="margin-top: 10px;color: #7A6666;">This website template has been designed by<br>
                        <a href="" style="color: #7A6666;">Free Website Templates</a><br>
                        for you, for free. You can replace all this text with your own text.
                    </p>
                </div>
                <div class="img">
                    <img src="https://freewebsitetemplates.com/preview/frozenyogurtshop/images/yogurt.jpg" alt="">
                </div>

            </section>

            <footer>
                <div class="third-box">
                    <div class="third-section">
                        <i class='fas fa-bacon'></i>
                        <a href="#" class="link">PRODUCTS</a>
                    </div>
                    <div class="third-section">
                        <i class="fa fa-hands"></i>
                        <a href="#" class="link">OUR STORY</a>
                    </div>
                    <div class="third-section">
                        <i class="fa fa-tint"></i>
                        <a href="#" class="link">FLAVORS</a>
                    </div>
                    <div class="third-section">
                        <i class="fa fa-map-marker-alt"></i>
                        <a href="#" class="link">OUR LOCATION</a>
                    </div>
                </div>

                <div class="fourth-bottom">
                    <div class="social-icons">
                        <a href="#"><i class="fab fa-facebook-f"></i></a>
                        <a href="#"><i class="fab fa-twitter"></i></a>
                        <a href="#"><i class="fab fa-google-plus-g"></i></a>
                        <a href="#"><i class="fab fa-pinterest-p"></i></a>
                    </div>
                    <div class="copyright">
                        &copy; 2023 Freeeze. All Rights Reserved.
                    </div>
                </div>
            </footer>
        </div>
    </div>
</body>

</html>
