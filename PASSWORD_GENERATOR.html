<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            width: 100vw;
            height: 100vh;
            font-family: Arial, sans-serif;
            margin: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: rgb(226, 131, 147);
        }

        #main-container {
            width: 600px;
            padding: 20px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            background-color: rgba(240, 209, 215, 0.702);
        }

        h1 {
            color: #333;
        }

        form {
            margin-top: 20px;
        }

        label {
            margin-bottom: 10px;
        }

        input[type="number"] {
            width: 50px;
        }

        input[type="submit"] {
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #4CAF50;
            border-radius: 6px;
            color: white;
            border: none;
            cursor: pointer;
        }

        input[type="submit"]:hover {
            background-color: #45a049;
        }

        @media screen and (max-width: 768px) {
            body {
            width: 80vw;
            height: 80vh;
            font-family: Arial, sans-serif;
            margin: auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }
            #main-container {
                width: 90vw;
                flex-direction: column;
            }
            
        }
    </style>
</head>

<body>
    <div id="main-container">
        <h1>Password Generator</h1>
        <form id="passwordForm">
            <p style="font-weight: 900;">CLICK TO COPY</p>
            <input type="text" id="password" name="password" placeholder="Generated Password" readonly><br><br>
            <label for="length">Password Length:</label>
            <input type="number" id="length" name="length" value="5" min="1" max="128" required>
            <br><br>
            <input type="checkbox" id="uppercase" name="uppercase" checked>
            <label for="uppercase">Include Uppercase Letters</label>
            <br>
            <input type="checkbox" id="lowercase" name="lowercase">
            <label for="lowercase">Include Lowercase Letters</label>
            <br>
            <input type="checkbox" id="numbers" name="numbers">
            <label for="numbers">Include Numbers</label>
            <br>
            <input type="checkbox" id="symbols" name="symbols">
            <label for="symbols">Include Symbols</label>
            <br><br>
            <input type="submit" id="btn" value="Generate Password">
        </form>
    </div>
    <script>
        // Character sets
        const Uppercase_Chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        const Lowercase_Chars = "abcdefghijklmnopqrstuvwxyz";
        const Number_Chars = "0123456789";
        const Symbol_Chars = "!@#$%^&*()_+~`|}{][:;?><,./-=";

        // Selectors
        const passwordField = document.getElementById('password');
        const lengthField = document.getElementById('length');
        const uppercaseField = document.getElementById('uppercase');
        const lowercaseField = document.getElementById('lowercase');
        const numbersField = document.getElementById('numbers');
        const symbolsField = document.getElementById('symbols');

        const GetRandomData = (dataSet) => {
            return dataSet[Math.floor(Math.random() * dataSet.length)];
        }
        // console.log(GetRandomData(Uppercase_Chars));



        const GeneratePassword = (password = "") => {
            if (uppercaseField.checked) {
                password += GetRandomData(Uppercase_Chars);
            }
            if (lowercaseField.checked) {
                password += GetRandomData(Lowercase_Chars);
            }
            if (numbersField.checked) {
                password += GetRandomData(Number_Chars);
            }
            if (symbolsField.checked) {
                password += GetRandomData(Symbol_Chars);
            }
            if (password.length < lengthField.value) {
                return GeneratePassword(password)
            }
            console.log( trimcate(password, lengthField.value ));
            return password;
        }

        document.getElementById('btn').addEventListener('click',
            function (e) {
                e.preventDefault();
                const password = GeneratePassword();
                passwordField.value = password;
                // console.log(password);
                passwordField.value = trimcate(password, lengthField.value );
            }

        );

        const trimcate = (str, length) => {
            if (str.length > length) {
                return str.substring(0, length  );
            } else {
                return str;
            }
        }

        // Add copy to clipboard functionality with popup
        // Create popup element
        const popup = document.createElement('div');
        popup.textContent = 'Password copied to clipboard!';
        popup.style.position = 'fixed';
        popup.style.top = '20px';
        popup.style.right = '20px';
        popup.style.background = '#4CAF50';
        popup.style.color = 'white';
        popup.style.padding = '10px 20px';
        popup.style.borderRadius = '6px';
        popup.style.boxShadow = '0 2px 8px rgba(0,0,0,0.2)';
        popup.style.fontSize = '16px';
        popup.style.zIndex = '1000';
        popup.style.display = 'none';
        document.body.appendChild(popup);

        function showPopup() {
            popup.style.display = 'block';
            setTimeout(() => {
                popup.style.display = 'none';
            }, 1500);
        }

        passwordField.addEventListener('click', function () {
            if (passwordField.value) {
                passwordField.select();
                document.execCommand('copy');
                showPopup();
            }
        });





    </script>




</body>

</html>
