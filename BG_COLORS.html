<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            border: 2px solid black;
            width: 50vw;
            height: 30vh;
            flex-direction: column;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 32px;
            gap: 20px;
            background: #eecc88;
        }

        button {
            width: 25vw;
            border-radius: 12px;
            padding: 20px;
            background: #e6a1a1;
            font-weight: 600;
            transition: all 0.2s;
        }

        /* button:hover{
            scale: .8;
        } */
    </style>
</head>

<body id="color">
    <div class="container">
        <h1 id="show">Hey!....</h1>
        <button id="btn" onclick="getcolor()">CLICK ME</button>
    </div>


    <script>
        function getcolor() {
            var colors = Math.floor(Math.random() * 10000000)
            var ranColor = '#' + colors.toString(16)
            console.log(colors, ranColor)
            document.body.style.backgroundColor = ranColor;
            document.getElementById('show').innerHTML = ranColor;

        };
        document.getElementById('btn').addEventListener("click", getcolor);
        document.getElementById('btn').addEventListener('click', function () {
            this.style.transform = 'scale(0.8)'; 
          
            setTimeout(() => {
                this.style.transform = 'scale(1)';
            }, 200);
        });

    </script>

</body>

</html>
